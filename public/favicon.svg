<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background -->
  <rect width="512" height="512" fill="#000000"/>
  
  <!-- Gradient background -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a1a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#000000;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="512" height="512" fill="url(#bgGradient)"/>
  
  <!-- Bold "SM" text -->
  <text x="256" y="340" 
        font-size="380" 
        font-weight="900"
        text-anchor="middle"
        fill="white"
        font-family="Arial, sans-serif"
        letter-spacing="-30">SM</text>
  
  <!-- Subtle accent lines -->
  <line x1="80" y1="256" x2="180" y2="256" stroke="white" stroke-width="8" opacity="0.3" stroke-linecap="round"/>
  <line x1="332" y1="256" x2="432" y2="256" stroke="white" stroke-width="8" opacity="0.3" stroke-linecap="round"/>
</svg>